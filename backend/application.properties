package com.example.airesume.controller;

import com.example.airesume.model.AnalysisResult;
import com.example.airesume.model.Job;
import com.example.airesume.model.Resume;
import com.example.airesume.repository.AnalysisResultRepository;
import com.example.airesume.repository.JobRepository;
import com.example.airesume.repository.ResumeRepository;
import com.example.airesume.service.FileParserService;
import com.example.airesume.service.NLPMatchService;
import com.fasterxml.jackson.databind.ObjectMapper;
import org.springframework.beans.factory.annotation.Autowired;
import org.springframework.http.ResponseEntity;
import org.springframework.web.bind.annotation.*;
import org.springframework.web.multipart.MultipartFile;
import java.util.List;

@RestController
@RequestMapping("/api")
@CrossOrigin(origins = "*")
public class AnalyzerController {

    @Autowired
    private JobRepository jobRepository;

    @Autowired
    private ResumeRepository resumeRepository;

    @Autowired
    private AnalysisResultRepository analysisResultRepository;

    @Autowired
    private FileParserService fileParserService;

    @Autowired
    private NLPMatchService nlpMatchService;
    
    @Autowired
    private ObjectMapper objectMapper;

    @PostMapping("/analyze")
    public ResponseEntity<?> analyzeResume(
            @RequestParam("file") MultipartFile file,
            @RequestParam("jobId") Long jobId,
            @RequestParam("candidateName") String candidateName) {
        
        try {
            // Get Job
            Job job = jobRepository.findById(jobId)
                    .orElseThrow(() -> new RuntimeException("Job not found"));

            // Parse file
            String text = fileParserService.extractText(file);

            // Save Resume
            Resume resume = new Resume();
            resume.setCandidateName(candidateName);
            resume.setOriginalFileName(file.getOriginalFilename());
            resume.setExtractedText(text);
            resume = resumeRepository.save(resume);

            // Analysis
            NLPMatchService.MatchResult result = nlpMatchService.analyze(text, job.getRequiredSkills());

            // Save Analysis Result
            AnalysisResult ar = new AnalysisResult();
            ar.setJob(job);
            ar.setResume(resume);
            ar.setMatchPercentage(result.matchPercentage);
            ar.setMatchedSkills(objectMapper.writeValueAsString(result.matchedSkills));
            ar.setMissingSkills(objectMapper.writeValueAsString(result.missingSkills));
            ar.setSuggestions(result.suggestions);
            ar = analysisResultRepository.save(ar);

            return ResponseEntity.ok(ar);

        } catch (Exception e) {
            return ResponseEntity.internalServerError().body("Error: " + e.getMessage());
        }
    }
    
    @GetMapping("/analysis/job/{jobId}")
    public ResponseEntity<List<AnalysisResult>> getAnalysisByJob(@PathVariable Long jobId) {
        return ResponseEntity.ok(analysisResultRepository.findByJobId(jobId));
    }
}
